name: Build ImmortalWrt x86_64

# =============================================================================
# ImmortalWrt x86_64 云编译工作流（源码全量编译）
# 触发方式：
#   1. workflow_dispatch：在 GitHub Actions 页面手动触发，可选分支与并发数
#   2. push：推送到仓库时自动触发（仅当本文件或 config 变更时）
# 单 job 上限 6 小时（GitHub 免费额度限制），24.10 稳定版 + 本配置约 1.5~2h
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "ImmortalWrt 源码仓库地址"
        required: true
        default: "https://github.com/immortalwrt/immortalwrt.git"
      repo_branch:
        description: "编译使用的分支"
        required: true
        default: "openwrt-24.10"
      config_file:
        description: "使用的 .config 种子文件路径"
        required: true
        default: "config/x86-64.config"
      make_thread:
        description: "make 并发数（-j），越大越快但越吃内存。GitHub runner 4C/16G 建议 2~4"
        required: true
        default: "2"
  push:
    paths:
      - ".github/workflows/build.yml"
      - "config/**"
      - "scripts/**"
  # 如需定时自动编译（例如每月 1 号），取消下面注释
  # schedule:
  #   - cron: "0 0 1 * *"

# 同一时间只允许一个编译任务，避免资源浪费
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: ${{ github.event.inputs.repo_url || 'https://github.com/immortalwrt/immortalwrt.git' }}
  REPO_BRANCH: ${{ github.event.inputs.repo_branch || 'openwrt-24.10' }}
  CONFIG_FILE: ${{ github.event.inputs.config_file || 'config/x86-64.config' }}
  MAKE_THREAD: ${{ github.event.inputs.make_thread || '2' }}
  TZ: Asia/Shanghai

jobs:
  build:
    name: Compile firmware
    runs-on: ubuntu-22.04

    steps:
      # --------------------------------------------------------------------
      # 0. 环境准备：释放磁盘空间（GitHub runner 默认只有 ~14G 可用，需清理）
      # --------------------------------------------------------------------
      - name: Free disk space
        run: |
          echo "==== 清理 Docker / 大文件 / APT 缓存 ===="
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/local/.ghcup
          sudo docker image prune -af || true
          sudo apt-get clean
          df -h /

      - name: Checkout project
        uses: actions/checkout@v4

      # --------------------------------------------------------------------
      # 1. 初始化编译环境（时区、依赖）
      #    GitHub Actions 的 runner 用户本身不是 root，可直接编译
      # --------------------------------------------------------------------
      - name: Setup build environment
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo apt-get update
          # 官方文档列出的编译依赖（Debian/Ubuntu）
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils rsync unzip \
            zlib1g-dev swig aria2 wget curl subversion jq python3 python3-pip \
            ccache libelf-dev device-tree-compiler libc6-dev libgmp-dev libmpc-dev \
            libmpfr-dev pkg-config
          df -h /

      # --------------------------------------------------------------------
      # 2. 缓存 toolchain / dl（加速二次编译，命中可省 30~60 分钟）
      # --------------------------------------------------------------------
      - name: Cache toolchain & downloads
        uses: actions/cache@v4
        with:
          path: |
            immortalwrt/.ccache
            immortalwrt/tmp
          key: ${{ runner.os }}-iw-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE) }}
          restore-keys: |
            ${{ runner.os }}-iw-${{ env.REPO_BRANCH }}-

      # --------------------------------------------------------------------
      # 3. 克隆源码（直接用 runner 用户，无需切换）
      # --------------------------------------------------------------------
      - name: Clone source
        run: |
          # 若缓存恢复了旧目录，先清理以便重新克隆
          rm -rf immortalwrt
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" immortalwrt
          cd immortalwrt
          # 记录 commit 便于追溯
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" > ../build-info.txt
          echo "GIT_DATE=$(git log -1 --format=%cd --date=format:%Y%m%d)" >> ../build-info.txt

      # --------------------------------------------------------------------
      # 4. 注入自定义 feeds（OpenClash 等外部源）+ 个性化脚本
      # --------------------------------------------------------------------
      - name: Inject feeds & diy scripts
        run: |
          cd immortalwrt
          # 追加自定义 feed（若 scripts/feeds.conf.custom 存在）
          if [ -f "$GITHUB_WORKSPACE/scripts/feeds.conf.custom" ]; then
            cat "$GITHUB_WORKSPACE/scripts/feeds.conf.custom" >> feeds.conf
            echo "==== feeds.conf ===="
            cat feeds.conf
          fi
          # 运行第一段个性化脚本（改 IP/主机名/时区等，作用于源码树）
          if [ -f "$GITHUB_WORKSPACE/scripts/diy-part1.sh" ]; then
            chmod +x "$GITHUB_WORKSPACE/scripts/diy-part1.sh"
            "$GITHUB_WORKSPACE/scripts/diy-part1.sh" "$GITHUB_WORKSPACE" "$PWD"
          fi

      # --------------------------------------------------------------------
      # 5. 更新并安装 feeds（对第三方源失败容错，避免网络问题中断整个编译）
      # --------------------------------------------------------------------
      - name: Update & install feeds
        run: |
          cd immortalwrt
          # 先更新官方 feeds（失败必须中断，否则无法继续）
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 对 feeds.conf 中声明的第三方 feed 逐个再 install 一次
          # 官方 feeds install -a 已包含它们，这里冗余执行以容错：
          # 某个第三方包 install 失败不影响其它包
          for feed in openclash nikki fchomo lucixray nekobox daed mosdns serverchan wechatpush timecontrol; do
            if grep -q "^src-git ${feed} " feeds.conf 2>/dev/null; then
              echo "==== 单独 install 第三方 feed: ${feed} ===="
              ./scripts/feeds install -a -p "${feed}" || echo "  [警告] ${feed} 安装部分包失败，已跳过（不影响主流程）"
            fi
          done

      # --------------------------------------------------------------------
      # 6. 加载 .config 种子并补全依赖
      # --------------------------------------------------------------------
      - name: Load config
        run: |
          cd immortalwrt
          # 把种子文件复制为 .config
          cp "$GITHUB_WORKSPACE/$CONFIG_FILE" .config
          # 运行第二段个性化脚本（作用于 .config，例如追加自定义包）
          if [ -f "$GITHUB_WORKSPACE/scripts/diy-part2.sh" ]; then
            chmod +x "$GITHUB_WORKSPACE/scripts/diy-part2.sh"
            "$GITHUB_WORKSPACE/scripts/diy-part2.sh" "$GITHUB_WORKSPACE" "$PWD"
          fi
          # make defconfig：根据种子自动补全所有依赖项
          # 对无效/不存在的包名会静默丢弃，不报错
          make defconfig

          echo "==== 最终 .config 摘要（luci-app 与代理内核）===="
          grep -E "^CONFIG_PACKAGE_(luci-app|sing-box|xray|v2ray|mihomo|mosdns|smartdns|tailscale|zerotier|wireguard|frpc|frps|mwan3|nlbwmon|netdata|collectd|nikki|fchomo|nekobox|daed|v2raya)" .config | head -100

          echo ""
          echo "==== 包存在性校验：被请求但未纳入的包（说明 feed 拉取失败或包名有误）===="
          # 对比种子里要求 =y 的包，哪些没出现在最终 .config 中
          MISSING=""
          while IFS= read -r line; do
            pkg=$(echo "$line" | grep -oE "^CONFIG_PACKAGE_[a-zA-Z0-9_-]+" | sed "s/^CONFIG_PACKAGE_//")
            if [ -n "$pkg" ]; then
              if ! grep -q "^CONFIG_PACKAGE_${pkg}=y" .config; then
                MISSING="${MISSING} ${pkg}"
              fi
            fi
          done < "$GITHUB_WORKSPACE/$CONFIG_FILE"
          if [ -n "$MISSING" ]; then
            echo "以下包未纳入（编译仍会继续，但固件不含这些功能）："
            for p in $MISSING; do echo "  - $p"; done
            echo "提示：若是第三方插件，检查 scripts/feeds.conf.custom 是否拉取成功"
          else
            echo "  全部请求的包都已纳入"
          fi

      # --------------------------------------------------------------------
      # 7. 下载 dl 包（单独一步并允许失败重试，便于定位网络问题）
      # --------------------------------------------------------------------
      - name: Download sources
        run: |
          cd immortalwrt
          make download -j"$MAKE_THREAD" V=s
          df -h /

      # --------------------------------------------------------------------
      # 8. 正式编译（最耗时，单 job 上限 6h）
      # --------------------------------------------------------------------
      - name: Compile
        run: |
          cd immortalwrt
          make -j"$MAKE_THREAD" V=s
          df -h /

      # --------------------------------------------------------------------
      # 9. 整理产物 + 上传 artifact（保留 30 天）
      # --------------------------------------------------------------------
      - name: Organize artifacts
        run: |
          cd immortalwrt
          mkdir -p "$GITHUB_WORKSPACE/firmware"
          # 复制主要镜像、manifest、版本信息
          cp -v bin/targets/x86/64/*.img.gz "$GITHUB_WORKSPACE/firmware/" 2>/dev/null || true
          cp -v bin/targets/x86/64/*manifest "$GITHUB_WORKSPACE/firmware/" 2>/dev/null || true
          # qemu 虚拟机镜像（combined-efi 会生成 vmdk/vhdx 等）
          cp -v bin/targets/x86/64/*.vmdk "$GITHUB_WORKSPACE/firmware/" 2>/dev/null || true
          # 附带编译信息
          cat "$GITHUB_WORKSPACE/build-info.txt" > "$GITHUB_WORKSPACE/firmware/BUILD-INFO.txt"
          echo "BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z')" >> "$GITHUB_WORKSPACE/firmware/BUILD-INFO.txt"
          ls -lh "$GITHUB_WORKSPACE/firmware/"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86-64-${{ env.REPO_BRANCH }}-${{ github.run_number }}
          path: firmware/
          retention-days: 30
          compression-level: 0  # 固件已是 gzip 压缩，无需二次压缩

      # --------------------------------------------------------------------
      # 10. （可选）编译失败时上传完整日志，便于排查
      # --------------------------------------------------------------------
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            immortalwrt/tmp/
            immortalwrt/.config
          retention-days: 7

      # --------------------------------------------------------------------
      # 11.（可选）自动发布 Release。如需启用：
      #     1) 在仓库 Settings → Secrets 添加 GH_TOKEN（个人访问令牌，需 repo 权限）
      #     2) 删除下方 if 条件与注释
      # --------------------------------------------------------------------
      # - name: Release
      #   if: success()
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: ${{ env.REPO_BRANCH }}-${{ github.run_number }}
      #     files: firmware/*
      #     body_path: firmware/BUILD-INFO.txt
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
